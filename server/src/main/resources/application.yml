spring:
  application:
    name: bazarflow-core
  docker:
    compose:
      file: ../compose.yml
      lifecycle-management: start-only
  datasource:
    url: ${BAZARFLOW_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bazarflow}
    username: ${BAZARFLOW_DATASOURCE_USERNAME:bazarflow}
    password: ${BAZARFLOW_DATASOURCE_PASSWORD:bazarflow}
  flyway:
    default-schema: public
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${BAZARFLOW_SECURITY_ISSUER_URI:http://localhost:8081/realms/bazarflow}
          jwk-set-uri: ${BAZARFLOW_SECURITY_JWK_SET_URI:http://localhost:8081/realms/bazarflow/protocol/openid-connect/certs}

bazarflow:
  security:
    resource-client-id: ${BAZARFLOW_SECURITY_RESOURCE_CLIENT_ID:bazarflow-api}

springdoc:
  swagger-ui:
    oauth:
      client-id: ${BAZARFLOW_SWAGGER_CLIENT_ID:bazarflow-ops-console}
      use-pkce-with-authorization-code-grant: true

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: BazarFlow Core
    description: B2B chilled-food distribution operations platform
    phase: active-development
