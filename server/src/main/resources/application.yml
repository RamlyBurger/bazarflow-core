spring:
  application:
    name: bazarflow-core
  docker:
    compose:
      file: ../compose.yml
      lifecycle-management: start-only
  datasource:
    url: ${BAZARFLOW_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bazarflow}
    username: ${BAZARFLOW_DATASOURCE_USERNAME:bazarflow}
    password: ${BAZARFLOW_DATASOURCE_PASSWORD:bazarflow}
  flyway:
    default-schema: public
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: BazarFlow Core
    description: B2B chilled-food distribution operations platform
    phase: phase-0-bootstrap
